@if (
  user.role === 'SALES_EXECUTIVE' ||
  user.role === 'SALES_MANAGER'
) {

  <app-sales-executive></app-sales-executive>

}

  user.role === 'SCM_EXECUTIVE' ||

) {

  <app-scm-executive></app-scm-executive>

}

@else {

  <app-sales-executive></app-sales-executive>

}
