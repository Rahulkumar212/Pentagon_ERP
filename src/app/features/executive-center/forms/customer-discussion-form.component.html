<div
  class="bg-white rounded-2xl p-6"
>

  <!-- Header -->

  <div
    class="flex items-center justify-between border-b border-gray-200 pb-4 mb-6"
  >

    <div>

      <h2
        class="text-xl font-bold text-gray-900"
      >
        Customer Discussion
      </h2>

      <p
        class="text-sm text-gray-500 mt-1"
      >
        Record customer discussion and quotation details
      </p>

    </div>

    <button
      type="button"
      (click)="close.emit()"
      class="h-10 w-10 rounded-full hover:bg-red-50 text-gray-500 hover:text-red-600 transition flex items-center justify-center"
    >
      ✕
    </button>

  </div>

  <!-- Customer Info -->

  <div
    class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6"
  >

    <div>

      <label
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Organization
      </label>

      <input
        [value]="lead.organization"
        readonly
        class="w-full border border-gray-300 rounded-lg px-4 py-3 bg-gray-50 text-gray-700"
      />

    </div>

    <div>

      <label
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Contact Person
      </label>

      <input
        [value]="lead.contactPerson"
        readonly
        class="w-full border border-gray-300 rounded-lg px-4 py-3 bg-gray-50 text-gray-700"
      />

    </div>

  </div>

  <!-- Form -->

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
  >

    <div
      class="grid grid-cols-1 md:grid-cols-2 gap-5"
    >

      <div>

        <label
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Panel Type
        </label>

        <select
          formControlName="panelType"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-200 focus:border-red-500 outline-none"
        >
          <option value="">
            Select Panel
          </option>

          <option value="Solar Panel">
            Solar Panel
          </option>

          <option value="Control Panel">
            Control Panel
          </option>

          <option value="Electrical Panel">
            Electrical Panel
          </option>

          <option value="Distribution Panel">
            Distribution Panel
          </option>

        </select>

      </div>

      <div>

        <label
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Amount (₹)
        </label>

        <input
          type="number"
          formControlName="amount"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-200 focus:border-red-500 outline-none"
        />

      </div>

    </div>

    <div class="mt-5">

      <label
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Remarks
      </label>

      <textarea
        rows="4"
        formControlName="remarks"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 resize-none focus:ring-2 focus:ring-red-200 focus:border-red-500 outline-none"
      ></textarea>

    </div>

    <!-- Actions -->

    <div
      class="flex justify-end gap-3 mt-6"
    >

      <button
        type="button"
        (click)="close.emit()"
        class="px-5 py-3 border border-gray-300 rounded-lg hover:bg-gray-50"
      >
        Cancel
      </button>

      <button
        type="submit"
        class="bg-red-800 text-white px-6 py-3 rounded-lg hover:bg-red-900 font-medium"
      >
        Save Discussion
      </button>

    </div>

  </form>

</div>
