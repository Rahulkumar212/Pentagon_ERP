<div class="w-full space-y-6">

    <!-- Header -->

    <div class="border-b border-gray-200 pb-5">

        <p class="uppercase tracking-[0.2em] text-red-800 text-xs font-bold">
            Sales & Marketing
        </p>

        <h1 class="text-3xl font-bold mt-2">
            Billing Orders
        </h1>

        <p class="text-gray-500 mt-2">
            Maintain all converted customer billing records.
        </p>

    </div>

    <!-- Button -->

    <button (click)="openModal()" class="bg-red-700 hover:bg-red-800 text-white px-6 py-3 rounded-lg font-semibold">

        ➕ Add Billing Order

    </button>

</div>

<!-- Table -->

<app-billing-order-table
  (edit)="editBilling($event)">
</app-billing-order-table>

<!-- Modal -->

@if(showModal){

<div class="fixed inset-0 bg-black/50 flex justify-center items-center z-50">

  <div class="bg-white rounded-xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">

    <app-billing-order-form
      [billing]="selectedBilling"
      (save)="saveBillingOrder()"
      (cancel)="closeModal()">
    </app-billing-order-form>

  </div>

</div>

}
