<div class="rounded-xl border border-gray-200 bg-white px-5 py-4 shadow-sm">

  <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

    <!-- Left -->

    <div class="flex items-start gap-3">

      <!-- Icon -->

      <div
        class="flex h-9 w-9 items-center justify-center rounded-lg bg-red-50 text-red-800">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 14l2-2 4 4m0-12H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V9l-5-5z" />

        </svg>

      </div>

      <!-- Title -->

      <div>

        <h1 class="text-lg font-semibold text-slate-900">

          Accounts Receivables & Billing

        </h1>

        <p class="mt-0.5 text-xs text-slate-500">

          Generate customer invoices, monitor dues and reconcile collections.

        </p>

      </div>

    </div>

    <!-- Action -->

    <button
      type="button"
      (click)="onCreateInvoice()"
      class="inline-flex items-center gap-2 rounded-lg bg-red-800 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-900">

      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2">

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 5v14m7-7H5" />

      </svg>

      New Customer Invoice

    </button>

  </div>

</div>
