<div class="grid grid-cols-1 gap-4 md:grid-cols-3">

  @for (card of summaryCards; track card.title) {

    <div
      class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition hover:shadow-md">

      <div class="flex items-start justify-between">

        <div>

          <p
            class="text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-500">

            {{ card.title }}

          </p>

          <h2
            class="mt-2 text-3xl font-bold"
            [ngClass]="card.color">

            {{ card.value }}

          </h2>

        </div>

        <!-- Document -->

        @if (card.icon === 'document') {

          <div
            class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-50 text-slate-300">

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-7 w-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8">

              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 2h6l5 5v15H4V2h5zm6 1v5h5" />

            </svg>

          </div>

        }

        <!-- Warning -->

        @if (card.icon === 'warning') {

          <div
            class="flex h-10 w-10 items-center justify-center rounded-lg bg-red-50 text-red-300">

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-7 w-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8">

              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v4m0 4h.01M10.29 3.86L1.82 18A2 2 0 003.53 21h16.94a2 2 0 001.71-3l-8.47-14.14a2 2 0 00-3.42 0z" />

            </svg>

          </div>

        }

        <!-- Success -->

        @if (card.icon === 'success') {

          <div
            class="flex h-10 w-10 items-center justify-center rounded-lg bg-emerald-50 text-emerald-300">

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-7 w-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8">

              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12l2 2 4-4m6-2a9 9 0 11-18 0a9 9 0 0118 0z" />

            </svg>

          </div>

        }

      </div>

    </div>

  }

</div>
