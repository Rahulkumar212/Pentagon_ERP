<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4">

  @for (card of summaryCards; track card.id) {

    <div
      class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-md">

      <!-- Header -->

      <div class="flex items-center justify-between">

        <p
          class="text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500">

          {{ card.title }}

        </p>

        <div
          class="flex h-10 w-10 items-center justify-center rounded-xl"
          [ngClass]="card.bgColor">

          <span
            class="material-icons text-sm"
            [ngClass]="card.color">

            {{ card.icon }}

          </span>

        </div>

      </div>

      <!-- Amount -->

      <h2
        class="mt-4 text-3xl font-bold leading-none text-slate-900">

        {{ card.value | currency:'INR':'symbol':'1.0-0' }}

      </h2>

      <!-- Footer -->

      <div
        class="mt-3 flex items-center justify-between">

        <span
          class="text-sm font-semibold"
          [ngClass]="card.positive ? 'text-emerald-600' : 'text-red-600'">

          {{ card.positive ? '↗' : '↘' }}
          {{ card.change }}%

        </span>

        <span
          class="text-xs text-slate-500">

          {{ card.subtitle }}

        </span>

      </div>

    </div>

  }

</div>
