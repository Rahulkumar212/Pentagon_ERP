<div
  class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm max-w-3xl">

  <!-- Header -->
  <div class="mb-4 flex items-start justify-between">

    <div>
      <h2 class="text-lg font-semibold text-slate-900">
        Revenue vs Expense Trend
      </h2>

      <p class="mt-1 text-xs text-slate-500">
        Monthly financial compilation (Accrual & Cash-flow baseline)
      </p>
    </div>

  </div>

  <!-- Chart -->
  <div
    echarts
    [options]="chartOptions"
    class="h-65 w-full">
  </div>

  <!-- Bottom Highlight -->
  <div
    class="mt-2 inline-flex rounded-lg border border-gray-200 bg-white px-3 py-2 text-xs shadow">

    <span class="text-slate-500">
      Latest Month :
    </span>

    <span class="ml-3 font-semibold text-red-800">
      Revenue : ₹51,250
    </span>

    <span class="ml-3 font-semibold text-slate-500">
      Expense : ₹21,750
    </span>

  </div>

</div>
