<div
  class="rounded-xl border border-gray-200 bg-white shadow-sm">

  <!-- Header -->

  <div
    class="border-b border-gray-200 px-5 py-4">

    <h2
      class="text-lg font-semibold text-gray-900">

      Finance Alerts

    </h2>

    <p
      class="mt-1 text-xs text-gray-500">

      Important financial notifications

    </p>

  </div>

  <!-- Body -->

  <div class="divide-y divide-gray-100">

    @for (
      alert of alerts;
      track alert.id
    ) {

      <div
        class="flex items-start gap-4 px-5 py-4">

        <!-- Priority -->

        <div
          class="mt-1 h-3 w-3 rounded-full"

          [class.bg-red-600]="
            alert.priority === 'HIGH'
          "

          [class.bg-yellow-500]="
            alert.priority === 'MEDIUM'
          "

          [class.bg-green-600]="
            alert.priority === 'LOW'
          ">
        </div>

        <!-- Content -->

        <div class="flex-1">

          <div
            class="flex items-center justify-between">

            <h3
              class="text-sm font-semibold text-gray-900">

              {{ alert.title }}

            </h3>

            <span
              class="text-[11px] text-gray-400">

              {{ alert.time }}

            </span>

          </div>

          <p
            class="mt-1 text-sm text-gray-600">

            {{ alert.message }}

          </p>

          <span
            class="mt-3 inline-flex rounded-full px-2 py-1 text-[10px] font-semibold uppercase tracking-wide"

            [class.bg-red-100]="
              alert.priority === 'HIGH'
            "

            [class.text-red-700]="
              alert.priority === 'HIGH'
            "

            [class.bg-yellow-100]="
              alert.priority === 'MEDIUM'
            "

            [class.text-yellow-700]="
              alert.priority === 'MEDIUM'
            "

            [class.bg-green-100]="
              alert.priority === 'LOW'
            "

            [class.text-green-700]="
              alert.priority === 'LOW'
            ">

            {{ alert.priority }}

          </span>

        </div>

      </div>

    } @empty {

      <div
        class="py-12 text-center text-sm text-gray-500">

        No finance alerts available.

      </div>

    }

  </div>

</div>
