<div class="rounded-xl border border-gray-200 bg-white px-5 py-4 shadow-sm">

  <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

    <!-- Left -->

    <div class="flex items-center gap-3">

      <!-- Icon -->

      <div
        class="flex h-9 w-9 items-center justify-center rounded-lg bg-red-50 text-red-800">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5V6a2 2 0 012-2h12v13M4 19.5A2.5 2.5 0 006.5 22H20"/>

        </svg>

      </div>

      <!-- Title -->

      <div>

        <h1 class="text-xl font-semibold text-slate-900">

          Accounting & General Ledger

        </h1>

        <p class="mt-0.5 text-xs text-slate-500">

          Double-entry accounting, balanced journals & automated trial reporting.

        </p>

      </div>

    </div>

    <!-- Navigation -->

    <div
      class="flex flex-wrap rounded-lg border border-gray-200 bg-slate-100 p-1">

      @for (tab of tabs; track tab.value) {

        <button
          (click)="setActiveTab(tab.value)"
          class="rounded-md px-3 py-1.5 text-xs font-medium transition-all duration-200"

          [class.bg-red-800]="activeTab === tab.value"
          [class.text-white]="activeTab === tab.value"

          [class.text-slate-600]="activeTab !== tab.value"
          [class.hover:bg-slate-200]="activeTab !== tab.value">

          {{ tab.label }}

        </button>

      }

    </div>

  </div>

</div>
