<div class="space-y-6">
<app-accounting-header
  [activeTab]="activeTab"
  (tabChange)="setTab($event)">
</app-accounting-header>

  @switch (activeTab) {

    @case ('accounts') {

      <app-chart-of-accounts-table>
      </app-chart-of-accounts-table>

    }

    @case ('journal') {

      <app-journal-table>
      </app-journal-table>

    }

    @case ('ledger') {

      <app-ledger-table>
      </app-ledger-table>

    }

    @case ('trialBalance') {

      <app-trial-balance-table>
      </app-trial-balance-table>

    }

  }

</div>
