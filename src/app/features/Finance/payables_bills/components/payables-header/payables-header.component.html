<div class="rounded-xl border border-gray-200 bg-white px-4 py-3 shadow-sm">

  <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">

    <!-- Left -->

    <div class="flex items-start gap-3">

      <!-- Icon -->

      <div
        class="flex h-8 w-8 items-center justify-center rounded-lg bg-red-50 text-red-800">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z" />

        </svg>

      </div>

      <!-- Title -->

      <div>

        <h1 class="text-base font-semibold text-slate-900">

          Accounts Payables & Vendor Bills

        </h1>

        <p class="mt-0.5 text-[11px] text-slate-500">

          Record vendor liabilities, manage due payments and optimize cash outflows.

        </p>

      </div>

    </div>

    <!-- Action Button -->

    <button
      type="button"
      (click)="onRecordVendorBill()"
      class="inline-flex items-center gap-2 rounded-lg bg-red-800 px-4 py-2 text-xs font-semibold text-white transition hover:bg-red-900">

      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2">

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 5v14m7-7H5" />

      </svg>

      Record Vendor Bill

    </button>

  </div>

</div>
