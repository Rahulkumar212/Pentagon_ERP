<div class="p-4">

    <!-- Header -->

    <div class="flex items-center justify-between mb-4">

        <h2 class="text-xl font-semibold text-gray-900">
            Add Client Organization
        </h2>

        <button type="button" (click)="close.emit()" class="text-gray-500 hover:text-red-700 text-xl">
            ✕
        </button>

    </div>

    <form [formGroup]="organizationForm" (ngSubmit)="submit()" class="space-y-4">

        <!-- Row 1 -->

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

            <div>

                <label class="block text-sm font-medium mb-1">
                    Organization Name *
                </label>

                <input formControlName="organization_name"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700" />

            </div>

            <div>

                <label class="block text-sm font-medium mb-1">
                    Name Of POC *
                </label>

                <input formControlName="name_of_poc"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700" />

            </div>

        </div>

        <!-- Row 2 -->

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

            <div>

                <label class="block text-sm font-medium mb-1">
                    Designation
                </label>

                <input formControlName="designation"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700" />

            </div>

            <div>

                <label class="block text-sm font-medium mb-1">
                    Phone Number *
                </label>

                <input formControlName="phoneNumber"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700" />

            </div>

        </div>

        <!-- Row 3 -->

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

            <div>

                <label class="block text-sm font-medium mb-1">
                    Email *
                </label>

                <input formControlName="email"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700" />

            </div>

            <div>

                <label class="block text-sm font-medium mb-1">
                    City
                </label>

                <input formControlName="city"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700" />

            </div>

        </div>

        <!-- Address -->

        <div>

            <label class="block text-sm font-medium mb-1">
                Address
            </label>

            <textarea rows="2" formControlName="address"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-red-700"></textarea>

        </div>

        <!-- Notes -->

        <div>

            <label class="block text-sm font-medium mb-1">
                Notes
            </label>

            <textarea rows="3" formControlName="notes"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-red-700"></textarea>

        </div>

        <!-- Priority -->

        <div>

            <label class="block text-sm font-medium mb-1">
                Priority
            </label>

            <select formControlName="priority"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-700">

                <option value="LOW">
                    Low
                </option>

                <option value="MEDIUM">
                    Medium
                </option>

                <option value="HIGH">
                    High
                </option>

            </select>

        </div>

        <!-- Footer -->

        <div class="flex justify-end gap-3 pt-2 border-t border-gray-200">

            <button type="button" (click)="close.emit()"
                class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-100">
                Cancel
            </button>

            <button type="submit" [disabled]="isSubmitting"
                class="px-5 py-2 text-sm bg-red-800 hover:bg-red-900 text-white rounded-lg font-medium disabled:opacity-50">
                {{ isSubmitting ? 'Saving...' : 'Save Organization' }}
            </button>

        </div>

    </form>

</div>
