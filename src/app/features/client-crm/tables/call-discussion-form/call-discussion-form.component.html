<div class="w-full rounded-2xl bg-white">

  <!-- ================= Header ================= -->

  <div class="sticky top-0 z-20 border-b border-gray-200 bg-white px-8 py-3">

    <h2 class="text-2xl font-bold text-gray-800">
      📞 Call Follow-up
    </h2>

    <p class="mt-1 text-sm text-gray-500">
      Record client discussion and submit it for Management Approval.
    </p>

  </div>

  <!-- ================= Form ================= -->

  <form
    [formGroup]="form"
    (ngSubmit)="save()">

    <div class="space-y-8 p-8">

      <!-- ================= Call Information ================= -->

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-6">

        <h3 class="mb-5 border-b border-gray-200 pb-3 text-lg font-semibold text-gray-800">
          Call Information
        </h3>

        <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">

          <div>

            <label class="mb-2 block text-sm font-medium">
              Call Date
            </label>

            <input
              type="date"
              formControlName="call_date"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Call Time
            </label>

            <input
              type="time"
              formControlName="call_time"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Call Type
            </label>

            <select
              formControlName="call_type"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

              <option value="">
                Select Call Type
              </option>

              <option value="OUTGOING">
                Outgoing Call
              </option>

              <option value="INCOMING">
                Incoming Call
              </option>

              <option value="WHATSAPP">
                WhatsApp Call
              </option>

              <option value="VIDEO">
                Video Meeting
              </option>

              <option value="MEETING">
                Physical Meeting
              </option>

            </select>

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Duration (Minutes)
            </label>

            <input
              type="number"
              formControlName="duration"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

          </div>

        </div>

      </div>

      <!-- ================= Discussion ================= -->

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-6">

        <h3 class="mb-5 border-b border-gray-200 pb-3 text-lg font-semibold text-gray-800">
          Discussion Details
        </h3>

        <div class="space-y-6">

          <div>

            <label class="mb-2 block text-sm font-medium">
              Discussion Summary
            </label>

            <textarea
              rows="2"
              formControlName="discussion"
              class="w-full resize-none rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">
            </textarea>

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Client Requirement
            </label>

            <textarea
              rows="2"
              formControlName="requirement"
              class="w-full resize-none rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">
            </textarea>

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Solution Explained
            </label>

            <textarea
              rows="2"
              formControlName="solution"
              class="w-full resize-none rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">
            </textarea>

          </div>

        </div>

      </div>

      <!-- ================= Client Response ================= -->

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-6">

        <h3 class="mb-5 border-b border-gray-200 pb-3 text-lg font-semibold text-gray-800">
          Client Response
        </h3>

        <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">

          <div>

            <label class="mb-2 block text-sm font-medium">
              Outcome
            </label>

            <select
              formControlName="outcome"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

              <option value="">
                Select Outcome
              </option>

              <option value="INTERESTED">
                Interested
              </option>

              <option value="QUOTATION">
                Need Quotation
              </option>

              <option value="DEMO">
                Need Demo
              </option>

              <option value="DISCOUNT">
                Need Discount
              </option>

              <option value="CALLBACK">
                Call Back Later
              </option>

              <option value="NOT_INTERESTED">
                Not Interested
              </option>

            </select>

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Expected Order Value (₹)
            </label>

            <input
              type="number"
              formControlName="expected_amount"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

          </div>

        </div>

      </div>

      <!-- ================= Next Follow-up ================= -->

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-6">

        <h3 class="mb-5 border-b border-gray-200 pb-3 text-lg font-semibold text-gray-800">
          Next Follow-up
        </h3>

        <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">

          <div>

            <label class="mb-2 block text-sm font-medium">
              Next Follow-up Date
            </label>

            <input
              type="date"
              formControlName="next_followup_date"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

          </div>

          <div>

            <label class="mb-2 block text-sm font-medium">
              Follow-up Mode
            </label>

            <select
              formControlName="followup_mode"
              class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">

              <option value="">
                Select Mode
              </option>

              <option value="PHONE">
                Phone Call
              </option>

              <option value="MEETING">
                Physical Meeting
              </option>

              <option value="VIDEO">
                Video Call
              </option>

              <option value="EMAIL">
                Email
              </option>

              <option value="WHATSAPP">
                WhatsApp
              </option>

            </select>

          </div>

        </div>

      </div>

      <!-- ================= Remarks ================= -->

      <div class="rounded-xl border border-gray-200 bg-gray-50 p-3">

        <h3 class=" border-b border-gray-200 pb-3 text-lg font-semibold text-gray-800">
          Remarks For Management
        </h3>

        <textarea
          rows="2"
          formControlName="remarks"
          class="w-full resize-none rounded-lg border border-gray-300 px-4 py-3 text-sm focus:border-red-600 focus:outline-none">
        </textarea>

      </div>

    </div>

    <!-- ================= Footer ================= -->

    <div class="sticky bottom-0 flex justify-end gap-3 border-t border-gray-200 bg-white px-8 py-5">

      <button
        type="button"
        (click)="cancel()"
        class="rounded-lg border border-gray-300 px-6 py-2.5 font-medium hover:bg-gray-100">

        Cancel

      </button>

      <button
        type="submit"
        [disabled]="form.invalid || isSubmitting"
        class="rounded-lg bg-red-700 px-6 py-2.5 font-semibold text-white hover:bg-red-800 disabled:cursor-not-allowed disabled:opacity-50">

        {{ isSubmitting ? 'Submitting...' : 'Submit For Approval' }}

      </button>

    </div>

  </form>

</div>
