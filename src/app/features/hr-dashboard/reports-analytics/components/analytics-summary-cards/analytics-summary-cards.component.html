<div class="grid grid-cols-4 gap-5">

  @for(card of cards; track card.title){

  <div
    class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition hover:shadow-md">

    <div class="flex items-start justify-between">

      <div>

        <p
          class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-400">

          {{ card.title }}

        </p>

        <div class="mt-2 flex items-center gap-2">

          <h2
            class="text-3xl font-serif text-red-900">

            {{ card.value }}

          </h2>

          @if(card.badge){

          <span
            class="rounded-md px-2 py-0.5 text-[9px] font-semibold uppercase"
            [ngClass]="card.badgeColor">

            {{ card.badge }}

          </span>

          }

        </div>

        <p
          class="mt-1 text-xs text-gray-500">

          {{ card.subtitle }}

        </p>

      </div>

      <div
        class="flex h-10 w-10 items-center justify-center rounded-lg text-base font-bold"
        [ngClass]="card.iconBg">

        {{ card.icon }}

      </div>

    </div>

  </div>

  }

</div>
