<div class="grid grid-cols-12 gap-5">

  <!-- Attendance Trend -->

  <div
    class="col-span-8 rounded-xl border border-gray-200 bg-white p-5 shadow-sm">

    <div class="mb-4">

      <p
        class="text-[10px] uppercase tracking-[0.2em] text-gray-500">

        Attendance

      </p>

      <h2
        class="mt-1 text-lg font-serif text-red-900">

        Monthly Attendance Trend

      </h2>

    </div>

    <div
      echarts
      [options]="attendanceChart"
      class="h-[300px] w-full">
    </div>

  </div>

  <!-- Department Distribution -->

  <div
    class="col-span-4 rounded-xl border border-gray-200 bg-white p-5 shadow-sm">

    <div class="mb-4">

      <p
        class="text-[10px] uppercase tracking-[0.2em] text-gray-500">

        Employees

      </p>

      <h2
        class="mt-1 text-lg font-serif text-red-900">

        Department Distribution

      </h2>

    </div>

    <div
      echarts
      [options]="departmentChart"
      class="h-[300px] w-full">
    </div>

  </div>

</div>
