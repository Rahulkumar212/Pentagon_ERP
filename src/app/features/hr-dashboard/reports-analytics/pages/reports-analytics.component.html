<div class="space-y-6">

  <!-- Header -->

  <app-reports-header
    [activeTab]="activeTab"
    (tabChanged)="onTabChange($event)">
  </app-reports-header>

  <!-- HR Analytics -->

  @if(activeTab === 'analytics'){

    <app-analytics-summary-cards />

    <div class="mt-6">
      <app-analytics-charts />
    </div>

  }

  <!-- Leave Reports -->

  @if(activeTab === 'leave'){

    <app-leave-request-list />

  }

  <!-- Payroll Summary -->

  @if(activeTab === 'payroll'){

    <app-payroll-summary-list />

  }

  @else if (activeTab === 'sales') {

  <app-organization-table [fetchType]="'ALL_VISITS'"></app-organization-table>

}


</div>
