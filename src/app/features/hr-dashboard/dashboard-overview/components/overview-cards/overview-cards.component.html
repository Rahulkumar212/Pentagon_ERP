<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5">

  @for(card of cards; track card.title){

  <div
    class="bg-white border border-gray-200 rounded-xl p-5 hover:shadow-lg transition-all duration-300">

    <!-- Top -->
    <div class="flex justify-between items-start">

      <div>

        <p
          class="uppercase tracking-[0.15em] text-[11px] font-semibold text-gray-400">
          {{ card.title }}
        </p>

        <div class="flex items-center gap-2 mt-3">

          <h2 class="text-3xl font-bold text-gray-900">
            {{ card.value }}
          </h2>

          <span
            class="text-[10px] px-2 py-1 rounded-full font-semibold"
            [ngClass]="card.badgeClass">
            {{ card.badge }}
          </span>

        </div>

      </div>

      <!-- Icon -->
      <div
        class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center text-xl">
        {{ card.icon }}
      </div>

    </div>

    <!-- Footer -->
    <p
      class="mt-4 text-sm text-gray-500">
      {{ card.description }}
    </p>

  </div>

  }

</div>
