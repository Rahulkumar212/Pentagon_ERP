<div
  class="bg-white border border-gray-200 rounded-xl shadow-sm p-5">

  <!-- Header -->
  <div
    class="flex justify-between items-center mb-5">

      <h2
        class="text-xl font-serif text-red-900">

        Roster & Leave Approvals

      </h2>

    <button
    (click)="getToLogs()"
      class="text-red-800 font-semibold uppercase tracking-wide text-[11px] hover:underline">

      Go To Logs →

    </button>

  </div>

  <!-- Leave Cards -->

  <div
    class="space-y-4 max-h-[250px] overflow-y-auto pr-2">

    @for(request of leaveRequests; track request.employee){

    <div
      class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition">

      <div
        class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4">

        <!-- Left -->

        <div
          class="flex items-start gap-3 flex-1">

          <!-- Avatar -->

          <div
            class="w-12 h-12 rounded-lg bg-red-100 flex items-center justify-center text-red-800 font-bold text-base shrink-0">

            {{ request.avatar }}

          </div>

          <!-- Details -->

          <div class="flex-1">

            <div
              class="flex flex-wrap items-center gap-2">

              <h3
                class="font-semibold text-base text-red-900">

                {{ request.employee }}

              </h3>

              <span
                class="px-2 py-0.5 rounded-full text-[9px] uppercase bg-red-100 text-red-700 font-semibold">

                {{ request.leaveType }}

              </span>

            </div>

            <p
              class="text-xs text-gray-500">

              {{ request.designation }}

            </p>

            <p
              class="text-xs mt-1">

              <strong>{{ request.duration }}</strong>

              ({{ request.date }})

            </p>

            <p
              class="italic text-xs text-gray-500 mt-1">

              "{{ request.remarks }}"

            </p>

          </div>

        </div>

        <!-- Right -->

        <div
          class="flex gap-2">

          <button
            (click)="rejectLeave(request)"
            class="px-4 py-1.5 text-sm rounded-lg border border-gray-300 hover:bg-gray-100">

            Reject

          </button>

          <button
            (click)="approveLeave(request)"
            class="px-4 py-1.5 text-sm rounded-lg bg-red-800 hover:bg-red-900 text-white">

            Approve

          </button>

        </div>

      </div>

    </div>

    }

  </div>

</div>
