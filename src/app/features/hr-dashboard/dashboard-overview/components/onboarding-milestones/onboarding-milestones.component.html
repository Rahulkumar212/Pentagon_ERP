<div
  class="bg-white border border-gray-200 rounded-xl shadow-sm p-5">

  <!-- Header -->
  <div
    class="flex justify-between items-center mb-5">

    <div>

      <h2
        class="text-xl font-serif text-red-900">

        Employee Onboarding

      </h2>

    </div>

    <button
      class="text-red-800 text-[11px] font-semibold uppercase tracking-wide hover:underline">

      View All →

    </button>

  </div>

  <!-- Cards -->

  <div class="space-y-4 max-h-[290px] overflow-y-auto pr-2">

   @for(employee of onboardingService.employees(); track employee.name){

    <div
      class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition">

      <div
        class="flex justify-between items-start gap-4">

        <!-- Left -->

        <div
          class="flex items-start gap-3 flex-1">

          <div
            class="w-12 h-12 rounded-lg bg-red-100 flex items-center justify-center text-red-800 font-bold text-base">

            {{ employee.avatar }}

          </div>

          <div class="flex-1">

            <h3 class="font-semibold text-base text-red-900">
              {{ employee.name }}
            </h3>

            <p class="text-xs text-gray-500">
              {{ employee.designation }}
            </p>

            <p class="text-[11px] text-gray-400 mt-1">
              {{ employee.department }}
            </p>

            <!-- Progress -->

            <div class="mt-3">

              <div class="flex justify-between text-[11px] mb-1">

                <span>Onboarding Progress</span>

                <span class="font-semibold">
                  {{ employee.progress }}%
                </span>

              </div>

              <div
                class="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden">

                <div
                  class="h-full bg-red-700 rounded-full transition-all duration-500"
                  [style.width.%]="employee.progress">

                </div>

              </div>

            </div>

          </div>

        </div>

        <!-- Right -->

        <div>

          <span
            class="inline-block px-2.5 py-1 rounded-full bg-red-100 text-red-700 text-[10px] font-semibold">

            {{ employee.status }}

          </span>

        </div>

      </div>

    </div>

    }

  </div>

</div>
