<div
  class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">

  <!-- Header -->
  <div class="mb-5">

    <p
      class="uppercase tracking-[0.2em] text-[11px] font-semibold text-red-700">

      Quick Workflows

    </p>

  </div>

  <!-- Cards -->
  <div
    class="grid grid-cols-2 lg:grid-cols-4 gap-4">

    @for(workflow of workflows; track workflow.title){

    <button
      (click)="onWorkflowClick(workflow)"
      class="group border border-red-200 rounded-xl p-5 hover:border-red-700 hover:bg-red-50 transition-all duration-300">

      <!-- Icon -->
      <div
        class="w-12 h-12 mx-auto rounded-xl border border-red-200 flex items-center justify-center text-xl text-red-700 group-hover:bg-red-700 group-hover:text-white transition">

        {{ workflow.icon }}

      </div>

      <!-- Title -->
      <h3
        class="mt-4 text-sm font-semibold text-gray-800 leading-tight">

        {{ workflow.title }}

      </h3>

    </button>

    }

  </div>

</div>
