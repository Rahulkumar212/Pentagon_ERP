<div class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">

  <div class="bg-white rounded-xl shadow-2xl border border-gray-200 w-full max-w-md overflow-hidden">

    <!-- Header -->

    <div class="bg-gradient-to-r from-red-900 to-red-700 px-5 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">

        <div
          class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center text-lg">

          📰

        </div>

        <div>

          <h2 class="text-base font-semibold text-white">

            Create Corporate Feed

          </h2>

          <p class="text-red-100 text-[11px]">

            Publish announcements & events

          </p>

        </div>

      </div>

      <button
        (click)="onCancel()"
        class="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 text-white transition">

        ✕

      </button>

    </div>

    <!-- Body -->

    <div class="p-5 space-y-4">

      <!-- Title -->

      <div>

        <label class="block mb-1 text-xs font-semibold text-gray-700">

          Feed Title

        </label>

        <input
          type="text"
          [(ngModel)]="form.title"
          placeholder="Employee of the Month"
          class="w-full h-10 px-3 rounded-lg border border-gray-300 text-sm focus:border-red-700 focus:ring-2 focus:ring-red-200 outline-none">

      </div>

      <!-- Description -->

      <div>

        <label class="block mb-1 text-xs font-semibold text-gray-700">

          Description

        </label>

        <textarea
          rows="4"
          [(ngModel)]="form.description"
          placeholder="Write announcement..."
          class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm resize-none focus:border-red-700 focus:ring-2 focus:ring-red-200 outline-none">

        </textarea>

      </div>

      <!-- Category -->

      <div>

        <label class="block mb-1 text-xs font-semibold text-gray-700">

          Category

        </label>

        <select
          [(ngModel)]="form.category"
          class="w-full h-10 px-3 rounded-lg border border-gray-300 text-sm focus:border-red-700 focus:ring-2 focus:ring-red-200 outline-none">

          <option value="Announcements">
            📢 Announcements
          </option>

          <option value="Birthday">
            🎂 Birthday
          </option>

          <option value="Recognition">
            🏆 Recognition
          </option>

          <option value="Events">
            🎉 Events
          </option>

        </select>

      </div>

    </div>

    <!-- Footer -->

    <div class="flex justify-end gap-2 px-5 py-4 border-t bg-gray-50">

      <button
        (click)="onCancel()"
        class="px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium hover:bg-gray-100 transition">

        Cancel

      </button>

      <button
        (click)="onPublish()"
        class="px-4 py-2 rounded-lg bg-red-800 hover:bg-red-900 text-white text-sm font-semibold transition">

        Publish

      </button>

    </div>

  </div>

</div>
