<div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">

  <!-- Heading -->

  <div>

    <h2
      class="text-lg font-bold uppercase tracking-[0.15em] text-gray-900">

      Web Punch Console

    </h2>

    <p
      class="mt-1 text-sm text-gray-500">

      Log standard office entry and exit events manually.

    </p>

  </div>

  <!-- Punch Box -->

  <div
    class="mt-6 rounded-xl border border-gray-200 bg-gray-50 p-8 text-center">

    <!-- Status -->

    <div
      class="flex items-center justify-center gap-2">

      <span
        class="h-3 w-3 rounded-full"

        [ngClass]="
          punchedIn()
            ? 'bg-green-500'
            : 'bg-gray-300'
        ">

      </span>

      <span
        class="text-sm font-semibold uppercase tracking-[0.15em]">

        {{

          punchedIn()

            ? 'PUNCHED IN'

            : 'NOT PUNCHED TODAY'

        }}

      </span>

    </div>

    <!-- Button -->

    <button

      (click)="punch()"

      class="mt-6 rounded-lg border border-black px-8 py-3 text-sm uppercase tracking-[0.18em] transition hover:bg-black hover:text-white">

      {{

        punchedIn()

          ? 'Trigger Punch Out'

          : 'Trigger Punch In'

      }}

    </button>

  </div>

  <!-- Timeline -->

  <div class="mt-6">

    <p
      class="mb-3 text-[10px] font-semibold uppercase tracking-[0.3em] text-gray-400">

      Today's Punch Timeline

    </p>

    <div
      class="flex items-center justify-between rounded-lg border border-gray-200 px-4 py-3">

      <span
        class="text-sm text-gray-600">

        {{

          punchedIn()

            ? 'Punch In (Biometric Verified)'

            : 'Waiting for Punch'

        }}

      </span>

      <span
        class="font-bold">

        {{

          punchTime || '--:--'

        }}

      </span>

    </div>

  </div>

</div>
