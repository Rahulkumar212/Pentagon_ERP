<div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">

  <!-- Header -->

  <div class="mb-5">

    <h2
      class="text-lg font-bold uppercase tracking-[0.15em] text-gray-900">

      Leave Requests

    </h2>

    <p
      class="mt-1 text-sm text-gray-500">

      Recent leave applications submitted by employees.

    </p>

  </div>

  <!-- Table -->

  <div class="overflow-x-auto">

    <table class="w-full">

      <thead>

        <tr class="border-b border-gray-200">

          <th class="py-3 text-left text-[11px] uppercase tracking-[0.18em] text-gray-500">
            Employee
          </th>

          <th class="py-3 text-left text-[11px] uppercase tracking-[0.18em] text-gray-500">
            Category
          </th>

          <th class="py-3 text-left text-[11px] uppercase tracking-[0.18em] text-gray-500">
            From
          </th>

          <th class="py-3 text-left text-[11px] uppercase tracking-[0.18em] text-gray-500">
            To
          </th>

          <th class="py-3 text-center text-[11px] uppercase tracking-[0.18em] text-gray-500">
            Days
          </th>

          <th class="py-3 text-center text-[11px] uppercase tracking-[0.18em] text-gray-500">
            Status
          </th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="let leave of leaveRequests"
          class="border-b border-gray-100 hover:bg-gray-50">

          <td class="py-3 text-sm font-medium">

            {{ leave.employee }}

          </td>

          <td class="py-3 text-sm">

            {{ leave.category }}

          </td>

          <td class="py-3 text-sm">

            {{ leave.fromDate }}

          </td>

          <td class="py-3 text-sm">

            {{ leave.toDate }}

          </td>

          <td class="py-3 text-center text-sm font-semibold">

            {{ leave.days }}

          </td>

          <td class="py-3 text-center">

            <span
              class="rounded-full px-3 py-1 text-xs font-semibold"

              [ngClass]="{

                'bg-yellow-100 text-yellow-700':
                leave.status === 'Pending',

                'bg-green-100 text-green-700':
                leave.status === 'Approved',

                'bg-red-100 text-red-700':
                leave.status === 'Rejected'

              }">

              {{ leave.status }}

            </span>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
