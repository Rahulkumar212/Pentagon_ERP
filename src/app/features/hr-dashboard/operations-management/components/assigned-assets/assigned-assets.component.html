<div class="rounded-xl border border-gray-200 bg-white shadow-sm">

  <!-- Header -->

  <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">

    <div>

      <p class="text-[10px] uppercase tracking-[0.22em] text-gray-500">

        Company Resources

      </p>

      <h2 class="mt-1 text-lg font-serif text-red-900">

        Assigned Assets

      </h2>

    </div>

    <div
      class="rounded-md bg-red-50 px-3 py-1 text-[10px] font-semibold uppercase tracking-widest text-red-700">

      {{ assets.length }} Assets

    </div>

  </div>

  <!-- Table -->

  <div class="overflow-x-auto">

    <table class="w-full">

      <thead class="bg-gray-50">

        <tr class="text-left text-[11px] uppercase tracking-widest text-gray-500">

          <th class="px-5 py-3">

            Asset

          </th>

          <th class="px-5 py-3">

            Asset ID

          </th>

          <th class="px-5 py-3">

            Assigned Date

          </th>

          <th class="px-5 py-3">

            Condition

          </th>

          <th class="px-5 py-3">

            Status

          </th>

        </tr>

      </thead>

      <tbody>

        @for(asset of assets; track asset.assetId){

          <tr class="border-t hover:bg-gray-50 transition">

            <td class="px-5 py-4">

              <div>

                <h3 class="text-sm font-semibold text-gray-900">

                  {{ asset.name }}

                </h3>

                <p class="text-xs text-gray-500">

                  {{ asset.category }}

                </p>

              </div>

            </td>

            <td class="px-5 py-4 text-sm">

              {{ asset.assetId }}

            </td>

            <td class="px-5 py-4 text-sm">

              {{ asset.assignedDate }}

            </td>

            <td class="px-5 py-4">

              <span
                class="rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700">

                {{ asset.condition }}

              </span>

            </td>

            <td class="px-5 py-4">

              <span

                class="rounded-full px-3 py-1 text-xs font-semibold"

                [ngClass]="{

                  'bg-green-100 text-green-700': asset.status === 'Assigned',

                  'bg-yellow-100 text-yellow-700': asset.status === 'Maintenance',

                  'bg-red-100 text-red-700': asset.status === 'Returned'

                }">

                {{ asset.status }}

              </span>

            </td>

          </tr>

        }

      </tbody>

    </table>

  </div>

</div>
