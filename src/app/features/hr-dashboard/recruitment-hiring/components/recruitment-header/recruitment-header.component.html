<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">

    <!-- Top Section -->
    <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5">

        <!-- Left -->
        <div>

            <p class="uppercase tracking-[0.2em] text-red-800 text-[11px] font-semibold">
                Talent & Hiring
            </p>

            <h1 class="mt-1 text-3xl font-serif text-red-900">
                Talent Acquisition
            </h1>

        </div>

        <!-- Right Tabs -->
        <div class="flex flex-wrap items-center gap-6">

            @for(tab of tabs; track tab){

            <button
                (click)="changeTab(tab)"
                class="relative pb-1.5 text-xs uppercase tracking-wide font-semibold transition-colors duration-200"
                [class.text-red-800]="activeTab === tab"
                [class.text-gray-500]="activeTab !== tab">

                {{ tab }}

                @if(activeTab === tab){
                <span
                    class="absolute left-0 bottom-0 h-[2px] w-full bg-red-800 rounded-full">
                </span>
                }

            </button>

            }

        </div>

    </div>

</div>


  <!-- Button -->
    <div class="flex justify-end mt-5">

        <button
            type="button"
            (click)="onRaiseRequisition()"
            class="inline-flex items-center gap-2
                   px-5 py-2.5
                   rounded-lg
                   bg-red-800
                   hover:bg-red-900
                   text-white
                   text-xs
                   font-semibold
                   uppercase
                   tracking-wide
                   transition">

            <span class="text-base leading-none">+</span>

            Raise Requisition

        </button>

    </div>
