<div
  (click)="openProfile()"
  class="bg-white cursor-pointer rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition-all duration-300 p-4 h-[220px] flex flex-col">

  <!-- Header -->
  <div class="flex justify-between items-start gap-2">

    <div class="flex gap-3 min-w-0">

      <!-- Avatar -->
      <img
        [src]="'https://ui-avatars.com/api/?name=' + employee.fullName + '&background=7f1d1d&color=fff'"
        [alt]="employee.fullName"
        class="w-10 h-10 rounded-lg border border-red-200 shrink-0">

      <!-- Employee Info -->
      <div class="min-w-0">

        <h3 class="font-semibold text-base text-red-900 truncate">
          {{ employee.fullName }}
        </h3>

        <p class="text-[10px] uppercase tracking-wide text-gray-500 truncate">
          {{ employee.designation }}
        </p>

      </div>

    </div>

  </div>

  <!-- Divider -->
  <div class="border-t border-red-100 my-3"></div>

  <!-- Details -->
  <div class="space-y-2 text-xs">

    <div class="flex justify-between">
      <span class="text-gray-500">Organization</span>
      <span class="font-medium">{{ employee.org_name }}</span>
    </div>

    <div class="flex justify-between">
      <span class="text-gray-500">Department</span>
      <span class="font-medium">{{ employee.department }}</span>
    </div>

    <div class="flex justify-between">
      <span class="text-gray-500">Email</span>
      <span class="font-medium truncate max-w-[140px]">
        {{ employee.workEmail }}
      </span>
    </div>

    <div class="flex justify-between">
      <span class="text-gray-500">Status</span>

      <span
        class="px-2 py-0.5 rounded-full text-[9px] font-semibold"
        [ngClass]="{
          'bg-green-100 text-green-700': employee.status === 'Active',
          'bg-blue-100 text-blue-700': employee.status === 'Probation',
          'bg-yellow-100 text-yellow-700': employee.status === 'On Leave'
        }">

        {{ employee.status }}

      </span>

    </div>

  </div>

  <!-- Footer -->
  <div class="mt-auto border-t border-red-100 pt-3 text-xs">

    <div class="flex justify-between">
      <span class="text-gray-500">Mobile</span>
      <span class="font-medium">{{ employee.mobileNumber }}</span>
    </div>

  </div>

</div>
