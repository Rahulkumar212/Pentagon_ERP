<div
  (click)="openProfile()"
  class="bg-white cursor-pointer rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition-all duration-300 p-4 h-[240px] flex flex-col">

  <!-- Header -->

  <div class="flex justify-between items-start gap-2">

    <div class="flex gap-2.5 min-w-0">

      <!-- Avatar -->

      <img
        [src]="employee.avatar"
        [alt]="employee.name"
        class="w-10 h-10 rounded-lg object-cover border border-red-200 shrink-0">

      <!-- Employee Info -->

      <div class="min-w-0">

        <h3
          class="font-semibold text-base text-red-900 truncate">

          {{ employee.name }}

        </h3>

        <p
          class="text-[10px] uppercase tracking-wide text-gray-500 truncate">

          {{ employee.designation }}

        </p>

      </div>

    </div>

    <!-- Employee Code -->

    <span
      class="text-[9px] font-semibold tracking-wide text-gray-400 whitespace-nowrap">

      {{ employee.employeeCode }}

    </span>

  </div>

  <!-- Divider -->

  <div class="border-t border-red-100 my-3"></div>

  <!-- Details -->

  <div class="space-y-2 text-xs">

    <div class="flex justify-between items-center gap-2">

      <span class="text-gray-500">

        Department

      </span>

      <span
        class="font-medium text-right truncate max-w-[120px]">

        {{ employee.department }}

      </span>

    </div>

    <div class="flex justify-between items-center">

      <span class="text-gray-500">

        Status

      </span>

      <span
        class="px-2 py-0.5 rounded-full text-[9px] font-semibold whitespace-nowrap"

        [ngClass]="{

          'bg-green-100 text-green-700':
          employee.status === 'Active',

          'bg-blue-100 text-blue-700':
          employee.status === 'Probation',

          'bg-yellow-100 text-yellow-700':
          employee.status === 'On Leave'

        }">

        {{ employee.status }}

      </span>

    </div>

  </div>

  <!-- Footer -->

  <div class="mt-auto">

    <div class="border-t border-red-100 pt-3">

      <div class="flex justify-between items-center text-xs">

        <!-- Rating -->

        <div
          class="flex items-center gap-1 text-red-800 font-semibold">

          ⭐

          <span>

            {{ employee.rating }}

          </span>

          <span class="text-gray-500">

            / 5

          </span>

        </div>

        <!-- Attendance -->

        <div
          class="flex items-center gap-1 text-red-800 font-semibold">

          📅

          <span>

            {{ employee.attendance }}%

          </span>

          <span class="text-gray-500">

            Attd

          </span>

        </div>

      </div>

    </div>

  </div>

</div>
