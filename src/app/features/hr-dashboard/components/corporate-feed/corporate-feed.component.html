<div
  class="bg-white rounded-2xl border border-gray-200 shadow-sm h-full">

  <!-- Header -->

  <div
    class="flex justify-between items-center p-6 border-b border-gray-200">

    <div>

      <h2
        class="text-2xl font-serif text-red-900">

        Corporate Feed

      </h2>

      <p
        class="text-sm text-gray-500">

        Announcements, recognitions & events

      </p>

    </div>

    <button
      class="w-10 h-10 rounded-lg bg-red-800 hover:bg-red-900 text-white text-xl">

      +

    </button>

  </div>

  <!-- Tabs -->

  <div
    class="flex gap-2 px-6 pt-5 pb-4 overflow-x-auto">

    @for(tab of tabs; track tab){

    <button

      (click)="selectedTab = tab"

      class="px-4 py-2 rounded-full text-xs font-semibold border transition"

      [class.bg-red-800]="selectedTab===tab"

      [class.text-white]="selectedTab===tab"

      [class.border-red-800]="selectedTab===tab"

      [class.bg-white]="selectedTab!==tab"

      [class.text-gray-600]="selectedTab!==tab"

      [class.border-gray-300]="selectedTab!==tab">

      {{ tab }}

    </button>

    }

  </div>

  <!-- Feed List -->

  <div
    class="px-6 pb-6 space-y-5 max-h-[620px] overflow-y-auto">

    @for(feed of filteredFeeds; track feed.title){

    <div
      class="border rounded-xl p-5 hover:shadow-md transition">

      <div
        class="flex justify-between items-center">

        <span
          class="px-3 py-1 rounded-full bg-red-50 text-red-700 text-[11px] uppercase font-bold tracking-wider">

          {{ feed.category }}

        </span>

        <span
          class="text-xs text-gray-400">

          {{ feed.date }}

        </span>

      </div>

      <h3
        class="mt-4 text-lg font-semibold text-red-900">

        {{ feed.title }}

      </h3>

      <p
        class="mt-3 text-sm text-gray-600 leading-6">

        {{ feed.description }}

      </p>

      <div
        class="mt-5 flex items-center gap-3">

        <div
          class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center font-bold text-red-700">

          {{ feed.author.charAt(0) }}

        </div>

        <div>

          <p
            class="text-sm font-semibold">

            {{ feed.author }}

          </p>

          <p
            class="text-xs text-gray-400">

            HR Team

          </p>

        </div>

      </div>

    </div>

    }

  </div>

</div>
