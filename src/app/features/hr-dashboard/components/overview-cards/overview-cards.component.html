<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">

  @for(card of cards; track card.title){

  <div
    class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-lg transition-all duration-300">

    <!-- Top -->

    <div class="flex justify-between items-start">

      <div>

        <p
          class="uppercase tracking-[0.2em] text-[11px] font-bold text-gray-400">

          {{ card.title }}

        </p>

        <div class="flex items-center gap-3 mt-3">

          <h2 class="text-4xl font-bold text-gray-900">

            {{ card.value }}

          </h2>

          <span
            class="text-[10px] px-2 py-1 rounded-full font-semibold"
            [ngClass]="card.badgeClass">

            {{ card.badge }}

          </span>

        </div>

      </div>

      <!-- Icon -->

      <div
        class="w-14 h-14 rounded-xl bg-red-50 flex items-center justify-center text-2xl">

        {{ card.icon }}

      </div>

    </div>

    <!-- Footer -->

    <p
      class="mt-5 text-sm text-gray-500">

      {{ card.description }}

    </p>

  </div>

  }

</div>
