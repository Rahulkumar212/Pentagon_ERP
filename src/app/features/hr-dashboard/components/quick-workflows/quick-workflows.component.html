<div
  class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">

  <!-- Header -->

  <div class="mb-6">

    <p
      class="uppercase tracking-[0.25em] text-[11px] font-bold text-red-700">

      Quick Workflows

    </p>

    <h2
      class="text-2xl font-serif  text-red-900 mt-2">

      HR Shortcuts

    </h2>

    <p
      class="text-sm text-gray-500 mt-1">

      Frequently used HR actions.

    </p>

  </div>

  <!-- Cards -->

  <div
    class="grid grid-cols-2 lg:grid-cols-4 gap-5">

    @for(workflow of workflows; track workflow.title){

    <button

      (click)="onWorkflowClick(workflow)"

      class="group border border-red-200 rounded-xl p-6 hover:border-red-700 hover:bg-red-50 transition-all duration-300">

      <!-- Icon -->

      <div
        class="w-14 h-14 mx-auto rounded-xl border border-red-200 flex items-center justify-center text-2xl text-red-700 group-hover:bg-red-700 group-hover:text-white transition">

        {{ workflow.icon }}

      </div>

      <!-- Title -->

      <h3
        class="mt-5 text-sm font-semibold text-gray-800">

        {{ workflow.title }}

      </h3>

    </button>

    }

  </div>

</div>
