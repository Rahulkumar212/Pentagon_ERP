<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">

  <div class="w-full max-w-2xl rounded-2xl bg-white shadow-2xl border border-gray-200 overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between bg-gray-100 px-6 py-4">

      <div>

        <h2 class="text-lg font-bold text-gray-900">
          Employee Onboarding
        </h2>

        <p class="text-xs text-gray-500 mt-1">
          Prepare employee onboarding checklist
        </p>

      </div>

      <button
        (click)="onCancel()"
        class="h-9 w-9 rounded-lg border border-gray-300 hover:bg-gray-200 transition">

        ✕

      </button>

    </div>

    <!-- Body -->
    <div class="p-6">

      <div class="space-y-5">

        <!-- Employee -->

        <div>

          <label class="block mb-2 text-sm font-semibold text-gray-700">

            Employee Name

          </label>

          <select
            [(ngModel)]="form.employeeId"
            (ngModelChange)="onEmployeeChange()"
            class="w-full h-11 rounded-xl border border-gray-300 px-4 focus:border-red-700 focus:ring-2 focus:ring-red-200 outline-none">

            <option [ngValue]="0">

              Select Employee

            </option>

            <option
              *ngFor="let employee of employees"
              [ngValue]="employee.id">

              {{ employee.fullName }}

            </option>

          </select>

        </div>

        <!-- Designation -->

        <div>

          <label class="block mb-2 text-sm font-semibold text-gray-700">

            Designation

          </label>

          <input
            type="text"
            [value]="form.designation"
            readonly
            class="w-full h-11 rounded-xl border border-gray-300 bg-gray-100 px-4 text-gray-700 cursor-not-allowed">

        </div>

        <!-- Joining Date -->

        <div>

          <label class="block mb-2 text-sm font-semibold text-gray-700">

            Joining Date

          </label>

          <input
            type="date"
            [(ngModel)]="form.joiningDate"
            class="w-full h-11 rounded-xl border border-gray-300 px-4 focus:border-red-700 focus:ring-2 focus:ring-red-200 outline-none">

        </div>

      </div>

    </div>

    <!-- Footer -->

    <div class="flex justify-end gap-3 border-t border-gray-200 px-6 py-4">

      <button
        (click)="onCancel()"
        class="rounded-xl border border-gray-300 px-6 py-2.5 text-gray-700 hover:bg-gray-100 transition">

        Cancel

      </button>

      <button
        (click)="onSubmit()"
        [disabled]="!isFormValid()"
        class="rounded-xl bg-red-800 px-6 py-2.5 font-semibold text-white hover:bg-red-900 disabled:bg-gray-400 disabled:cursor-not-allowed transition">

        Create Master Checklist

      </button>

    </div>

  </div>

</div>
