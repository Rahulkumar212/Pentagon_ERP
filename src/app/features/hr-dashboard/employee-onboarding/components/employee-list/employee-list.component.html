<div class="border-r border-gray-200 max-h-[650px] overflow-y-auto">

  <div class="p-4">

    <h3 class="text-xs uppercase tracking-widest text-gray-500 mb-4">

      Employee List

    </h3>

    @for(employee of employees; track employee.name){

    <div
      (click)="onSelectEmployee(employee)"
      class="mb-3 rounded-xl border cursor-pointer transition-all duration-200 hover:shadow-md"

      [class.bg-red-800]="selectedEmployee.name===employee.name"
      [class.text-white]="selectedEmployee.name===employee.name"
      [class.border-red-800]="selectedEmployee.name===employee.name"
      [class.border-gray-200]="selectedEmployee.name!==employee.name">

      <div class="p-4 flex gap-4 items-start">

        <!-- Avatar -->

        <div
          class="w-12 h-12 rounded-full bg-red-100 text-red-800 flex items-center justify-center font-bold shrink-0"
          [class.bg-white]="selectedEmployee.name===employee.name"
          [class.text-red-800]="selectedEmployee.name===employee.name">

          {{ employee.avatar }}

        </div>

        <!-- Details -->

        <div class="flex-1">

          <h4 class="font-semibold text-sm">

            {{ employee.name }}

          </h4>

          <p
            class="text-xs mt-1"
            [class.text-red-100]="selectedEmployee.name===employee.name"
            [class.text-gray-500]="selectedEmployee.name!==employee.name">

            {{ employee.designation }}

          </p>

          <p
            class="text-[11px] mt-1"
            [class.text-red-200]="selectedEmployee.name===employee.name"
            [class.text-gray-400]="selectedEmployee.name!==employee.name">

            {{ employee.department }}

          </p>

          <!-- Joining Date -->

          <p
            class="text-[11px] mt-1"
            [class.text-red-200]="selectedEmployee.name===employee.name"
            [class.text-gray-400]="selectedEmployee.name!==employee.name">

            Joining :
            {{ employee.joiningDate | date:'dd MMM yyyy' }}

          </p>

          <!-- Progress -->

          <div class="mt-3">

            <div class="flex justify-between text-[11px] mb-1">

              <span>

                Progress

              </span>

              <span>

                {{ employee.progress }}%

              </span>

            </div>

            <div class="h-1.5 rounded-full bg-gray-200 overflow-hidden">

              <div
                class="h-full bg-red-700 transition-all duration-300"
                [style.width.%]="employee.progress">

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

    }

    @empty {

    <div class="py-12 text-center text-sm text-gray-500">

      No Employees Found

    </div>

    }

  </div>

</div>
