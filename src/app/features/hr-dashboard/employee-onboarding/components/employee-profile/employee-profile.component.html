<div class="flex items-start justify-between gap-6">

  <!-- Left -->
  <div class="flex gap-4">

    <!-- Avatar -->
    <div
      class="flex h-16 w-16 items-center justify-center rounded-xl bg-red-100 text-2xl font-bold text-red-800">

      {{ employee.employee.fullName.charAt(0).toUpperCase() }}

    </div>

    <!-- Employee Info -->
    <div>

      <h2 class="text-2xl font-serif text-red-900">
        {{ employee.employee.fullName }}
      </h2>

      <p class="text-gray-600">
        {{ employee.employee.designation }}
      </p>

      <p class="mt-1 text-sm text-gray-500">
        {{ employee.employee.department }}
      </p>

      <p class="mt-1 text-sm text-gray-500">
        Joining :
        {{ employee.joiningDate | date:'dd MMM yyyy' }}
      </p>

    </div>

  </div>

  <!-- Right -->
  <div class="flex flex-col items-end gap-3">

    <span
      class="rounded-full bg-green-100 px-4 py-2 text-xs font-semibold text-green-700">

      Onboarding

    </span>

    <button
      (click)="onGenerateEmployeeCode()"
      [disabled]="!canGenerateCode"
      class="whitespace-nowrap rounded-lg px-5 py-2 text-xs font-semibold transition-all duration-300"

      [class.bg-green-600]="canGenerateCode"
      [class.hover:bg-green-700]="canGenerateCode"
      [class.text-white]="canGenerateCode"

      [class.bg-gray-200]="!canGenerateCode"
      [class.text-gray-500]="!canGenerateCode">

      Generate Employee Code

    </button>

  </div>

</div>

<div class="my-6 border-t border-gray-200"></div>
