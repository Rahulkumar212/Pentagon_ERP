<div class="flex justify-between items-start gap-6">

    <!-- Left -->

    <div class="flex gap-4">

        <!-- Avatar -->

        <div
            class="w-16 h-16 rounded-xl bg-red-100 text-red-800 flex items-center justify-center text-2xl font-bold">

            {{ employee.avatar }}

        </div>

        <!-- Employee Info -->

        <div>

            <h2 class="text-2xl font-serif text-red-900">

                {{ employee.name }}

            </h2>

            <p class="text-gray-600">

                {{ employee.designation }}

            </p>

            <p class="text-sm text-gray-500 mt-1">

                {{ employee.department }}

            </p>

            <p class="text-sm text-gray-500 mt-1">

                Joining :
                {{ employee.joiningDate | date:'dd MMM yyyy' }}

            </p>

        </div>

    </div>

    <!-- Right -->

    <div class="flex flex-col items-end gap-3">

        <span
            class="px-4 py-2 rounded-full bg-red-100 text-red-700 text-xs font-semibold">

            {{ employee.status }}

        </span>

        <button
            (click)="onGenerateEmployeeCode()"
            [disabled]="!canGenerate"
            class="px-5 py-2 rounded-lg text-xs font-semibold transition-all duration-300 whitespace-nowrap"

            [class.bg-green-600]="canGenerate"
            [class.hover:bg-green-700]="canGenerate"
            [class.text-white]="canGenerate"

            [class.bg-gray-200]="!canGenerate"
            [class.text-gray-500]="!canGenerate">

            Generate Employee Code

        </button>

    </div>

</div>

<div class="border-t border-gray-200 my-6"></div>
