<!-- Divider -->

<div class="border-t border-gray-200 my-6"></div>

<!-- Title -->

<h3 class="text-xs uppercase tracking-[0.2em] text-gray-500 font-semibold mb-4">

    Required Formalities

</h3>

<!-- Checklist -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    @for(item of checklist; track item.title){

    <div
        class="border border-gray-200 rounded-xl p-4 hover:shadow-sm hover:border-red-300 transition">

        <div class="flex items-start justify-between gap-4">

            <!-- Left -->

            <div class="flex items-start gap-4 flex-1">

                <button
                    (click)="toggleItem(item)"
                    class="w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 mt-1"
                    [class.bg-green-600]="item.completed"
                    [class.border-green-600]="item.completed"
                    [class.border-gray-300]="!item.completed">

                    @if(item.completed){

                    <span class="text-white text-xs">

                        ✓

                    </span>

                    }

                </button>

                <div>

                    <span
                        class="inline-block px-2 py-1 mb-2 rounded border border-gray-300 text-[10px] uppercase tracking-wide">

                        {{ item.category }}

                    </span>

                    <h4 class="font-semibold text-gray-900">

                        {{ item.title }}

                    </h4>

                </div>

            </div>

            <!-- Right -->

            <div class="text-right shrink-0">

                <p
                    class="text-xs font-semibold"
                    [class.text-green-600]="item.completed"
                    [class.text-orange-500]="!item.completed">

                    {{ item.completed ? 'Completed' : 'Pending' }}

                </p>

            </div>

        </div>

    </div>

    }

</div>
