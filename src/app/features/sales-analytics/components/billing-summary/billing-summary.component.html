<div class="rounded-xl border border-gray-200 bg-white shadow-sm">

  <!-- Header -->

  <div
    class="flex items-center justify-between border-b border-gray-200 px-5 py-4">

    <div>

      <p class="text-[10px] uppercase tracking-[0.25em] text-gray-500">
        Finance Overview
      </p>

      <h2 class="mt-1 text-lg font-serif text-red-900">
        Billing Summary
      </h2>

    </div>

    <span
      class="rounded-md bg-red-50 px-3 py-1 text-[10px] font-semibold uppercase tracking-widest text-red-700">

      Monthly

    </span>

  </div>

  <!-- Chart -->

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 p-6">

    <div
      #billingChart
      class="w-full h-[320px]">
    </div>

    <div
      class="flex flex-col justify-center space-y-4">

      @for(item of billings; track item.client){

      <div
        class="flex justify-between items-center rounded-lg border border-gray-200 p-3">

        <div>

          <h3
            class="font-semibold text-gray-900">

            {{ item.client }}

          </h3>

          <p
            class="text-xs text-gray-500">

            {{ item.invoice }}

          </p>

        </div>

        <div class="text-right">

          <p
            class="font-bold text-red-900">

            {{ item.amount }}

          </p>

          <span
            class="mt-1 inline-block rounded-full px-2 py-0.5 text-[10px] font-semibold"

            [ngClass]="{

              'bg-green-100 text-green-700': item.status === 'Paid',

              'bg-yellow-100 text-yellow-700': item.status === 'Pending',

              'bg-red-100 text-red-700': item.status === 'Overdue'

            }">

            {{ item.status }}

          </span>

        </div>

      </div>

      }

    </div>

  </div>

</div>
