<div class="bg-white rounded-xl border border-gray-200 shadow-sm">

    <!-- Header -->

    <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">

        <div>

            <p class="text-[10px] uppercase tracking-[0.22em] text-gray-500">

                Institution Visits

            </p>

            <h2 class="mt-1 text-lg font-serif text-red-900">

                Visit Performance

            </h2>

        </div>

        <span
            class="rounded-md bg-green-50 px-3 py-1 text-[10px] font-semibold uppercase tracking-widest text-green-700">

            This Month

        </span>

    </div>

    <!-- KPI -->

    <div class="grid grid-cols-4 border-b border-gray-200">

        <div class="p-5">

            <p class="text-xs text-gray-500">

                Total Visits

            </p>

            <h3 class="mt-1 text-2xl font-bold text-red-900">

                186

            </h3>

        </div>

        <div class="border-l border-gray-200 p-5">

            <p class="text-xs text-gray-500">

                Completed

            </p>

            <h3 class="mt-1 text-2xl font-bold text-green-700">

                169

            </h3>

        </div>

        <div class="border-l border-gray-200 p-5">

            <p class="text-xs text-gray-500">

                Planned

            </p>

            <h3 class="mt-1 text-2xl font-bold text-blue-700">

                27

            </h3>

        </div>

        <div class="border-l border-gray-200 p-5">

            <p class="text-xs text-gray-500">

                Success

            </p>

            <h3 class="mt-1 text-2xl font-bold text-orange-600">

                91%

            </h3>

        </div>

    </div>

    <!-- Chart -->

    <div class="p-5">

        <div
            echarts
            [options]="chartOption"
            class="h-[380px] w-full">
        </div>

    </div>

</div>
