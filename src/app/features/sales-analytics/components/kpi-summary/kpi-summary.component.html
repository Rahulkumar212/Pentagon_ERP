<div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">

  @for(kpi of kpis; track kpi.title){

  <div
    class="rounded-lg border border-gray-200 bg-white shadow-sm hover:shadow-md transition-all duration-300 p-3">

    <!-- Top -->

    <div class="flex items-center justify-between">

      <div
        class="w-8 h-8 rounded-lg bg-red-50 flex items-center justify-center text-base">

        {{ kpi.icon }}

      </div>

      <span
        class="px-2 py-0.5 rounded-full text-[9px] font-semibold"
        [ngClass]="kpi.badgeColor">

        {{ kpi.badge }}

      </span>

    </div>

    <!-- Value -->

    <h2 class="mt-3 text-xl font-bold text-gray-900">

      {{ kpi.value }}

    </h2>

    <!-- Title -->

    <p class="mt-1 text-[11px] font-semibold text-red-900">

      {{ kpi.title }}

    </p>

    <!-- Subtitle -->

    <p class="mt-0.5 text-[10px] text-gray-500">

      {{ kpi.subtitle }}

    </p>

  </div>

  }

</div>
