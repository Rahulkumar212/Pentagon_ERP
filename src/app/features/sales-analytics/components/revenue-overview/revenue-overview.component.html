<div class="rounded-xl border border-gray-200 bg-white shadow-sm">

    <!-- Header -->

    <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">

        <div>

            <p class="text-[10px] uppercase tracking-[0.22em] text-gray-500">

                Revenue Insights

            </p>

            <h2 class="mt-1 text-lg font-serif text-red-900">

                Monthly Revenue Overview

            </h2>

        </div>

        <span
            class="rounded-md bg-green-50 px-3 py-1 text-[10px] font-semibold uppercase tracking-widest text-green-700">

            +22%

        </span>

    </div>

    <!-- KPI -->

    <div class="grid grid-cols-3 border-b border-gray-200">

        <div class="p-5">

            <p class="text-xs text-gray-500">

                Revenue

            </p>

            <h3 class="mt-1 text-2xl font-bold text-red-900">

                ₹2.48 Cr

            </h3>

        </div>

        <div class="border-x border-gray-200 p-5">

            <p class="text-xs text-gray-500">

                Avg / Month

            </p>

            <h3 class="mt-1 text-2xl font-bold text-gray-900">

                ₹41 L

            </h3>

        </div>

        <div class="p-5">

            <p class="text-xs text-gray-500">

                Growth

            </p>

            <h3 class="mt-1 text-2xl font-bold text-green-700">

                22%

            </h3>

        </div>

    </div>

    <!-- Chart -->

    <div class="p-5">

        <div
            echarts
            [options]="chartOption"
            class="h-[340px] w-full">
        </div>

    </div>

</div>
