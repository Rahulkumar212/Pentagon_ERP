<div class="rounded-xl border border-gray-200 bg-white shadow-sm">

  <!-- HEADER -->
  <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">

    <div>
      <p class="text-[10px] uppercase tracking-[0.22em] text-gray-500">
        Activity Analytics
      </p>

      <h2 class="mt-1 text-lg font-serif text-red-900">
        Recent Activity Overview
      </h2>
    </div>

    <span class="rounded-md bg-red-50 px-3 py-1 text-[10px] font-semibold uppercase tracking-widest text-red-700">
      Live
    </span>

  </div>

  <!-- 📊 CHART -->
  <div class="p-5">

    <div echarts [options]="chartOption" class="w-full h-[420px]"></div>

  </div>

</div>
