<div
  class="bg-white rounded-2xl border border-gray-200 shadow-lg overflow-hidden"
>

  <!-- Header -->
  <div
    class="flex items-center justify-between px-5 py-4 bg-gradient-to-r from-red-800 to-red-600 text-white"
  >

    <button
      (click)="prevMonth()"
      class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 transition flex items-center justify-center"
    >
      ◀
    </button>

    <div class="text-center">

      <h2 class="text-lg font-bold tracking-wide">
        {{ currentDate | date:'MMMM yyyy' }}
      </h2>

      <p class="text-xs text-red-100">
        Calendar
      </p>

    </div>

    <button
      (click)="nextMonth()"
      class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 transition flex items-center justify-center"
    >
      ▶
    </button>

  </div>

  <!-- Week Days -->
  <div
    class="grid grid-cols-7 bg-gray-50 border-b text-[11px] uppercase font-semibold tracking-wide text-gray-500 py-3"
  >

    <div class="text-center">Sun</div>
    <div class="text-center">Mon</div>
    <div class="text-center">Tue</div>
    <div class="text-center">Wed</div>
    <div class="text-center">Thu</div>
    <div class="text-center">Fri</div>
    <div class="text-center">Sat</div>

  </div>

  <!-- Dates -->
  <div class="grid grid-cols-7 gap-2 p-4">

    @for(day of daysInMonth; track day){

    <button
      (click)="selectDate(day)"
      class="aspect-square rounded-xl text-sm font-medium transition-all duration-200 hover:scale-105 hover:bg-red-100 hover:text-red-700 flex items-center justify-center"

      [ngClass]="{

        'bg-red-700 text-white shadow-md scale-105':
          selectedDate &&
          day.toDateString() === selectedDate.toDateString(),

        'bg-red-100 text-red-700 font-bold border border-red-300':
          isToday(day)

      }"
    >

      {{ day.getDate() }}

    </button>

    }

  </div>

  <!-- Footer -->

  <div
    class="border-t bg-gray-50 px-4 py-3 flex items-center justify-between text-xs text-gray-500"
  >

    <span>
      Today:
      {{ today | date:'dd MMM yyyy' }}
    </span>

    @if(selectedDate){

    <span class="font-semibold text-red-700">
      Selected:
      {{ selectedDate | date:'dd MMM' }}
    </span>

    }

  </div>

</div>
