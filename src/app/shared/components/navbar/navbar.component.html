<div class="h-16 w-full bg-white border-b flex items-center justify-between px-6 shadow-sm">

  <!-- 🔍 LEFT: SEARCH -->
  <div class="w-1/3">
    <input
      type="text"
      [(ngModel)]="searchText"
      (keyup.enter)="onSearch()"
      placeholder="Search..."
      class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-300"
    />
  </div>

  <!-- 🔔 RIGHT SIDE -->
  <div class="flex items-center gap-6 relative">

    <!-- NOTIFICATION -->
    <div class="relative cursor-pointer" (click)="toggleNotifications()">

      🔔

      <span class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">
        {{ notifications.length }}
      </span>

      <!-- DROPDOWN -->
      @if(showNotifications){
      <div class="absolute right-0 mt-3 w-64 bg-white border shadow-lg rounded-xl z-50">

        <div class="p-3 border-b font-semibold">
          Notifications
        </div>

        @for(n of notifications; track n.id){
        <div class="p-3 text-sm hover:bg-gray-100 border-b">
          {{ n.message }}
        </div>
        }

      </div>
      }

    </div>

    <!-- USER INFO -->
    <div class="flex items-center gap-3">
       <!-- AVATAR -->
      <div class="w-9 h-9 bg-red-800 text-white flex items-center justify-center rounded-full font-bold">
  {{ getInitials(name) }}
</div>

      <div class="text-right">
        <p class="text-sm font-semibold text-gray-800">
          {{ name }}
        </p>

        <p class="text-xs text-gray-500">
          {{ role }}
        </p>
      </div>

    </div>

    <!-- LOGOUT -->
    <button
      (click)="logout()"
      class="bg-red-800 text-white px-4 py-2 rounded-xl hover:bg-red-900"
    >
      Logout
    </button>

  </div>

</div>
