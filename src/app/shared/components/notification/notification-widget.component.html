<div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">

  <!-- Header -->

  <div
    class="bg-linear-to-r from-red-800 to-red-600 px-5 py-4 flex items-center justify-between"
  >

    <div class="flex items-center gap-2">

      <span class="text-xl">🔔</span>

      <h2 class="text-white font-semibold">
        Notifications
      </h2>

    </div>

    <span
      class="bg-white text-red-700 text-xs font-bold px-2 py-1 rounded-full"
    >
      {{ notifications.length }}
    </span>

  </div>

  <!-- Body -->

  <div class="max-h-112.5 overflow-y-auto">

    @for(item of notifications; track item.id){

    <div
      class="p-4 border-b border-gray-100 hover:bg-red-50 transition cursor-pointer"
    >

      <div class="flex items-start gap-3">

        <div
          class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-700 text-lg shrink-0"
        >
          🔔
        </div>

        <div class="flex-1">

          <h3
            class="text-sm font-semibold text-gray-800"
          >
            {{ item.title || 'New Update' }}
          </h3>

          <p
            class="text-sm text-gray-600 mt-1 leading-5"
          >
            {{ item.message }}
          </p>

          <p
            class="text-xs text-gray-400 mt-2"
          >
            {{ item.time }}
          </p>

        </div>

      </div>

    </div>

    }

    @empty{

    <div
      class="flex flex-col items-center justify-center py-10 px-4"
    >

      <div
        class="w-14 h-14 rounded-full bg-gray-100 flex items-center justify-center text-2xl"
      >
        🔕

      </div>

      <p class="mt-3 text-gray-500 text-sm">
        No notifications available
      </p>

    </div>

    }

  </div>

</div>
