<div class="bg-white rounded-2xl shadow-xl border border-red-200">

  <!-- Header -->

  <div class="px-6 py-5 border-b">

    <div class="flex justify-between items-center">

      <h2 class="text-xl font-bold text-red-800">
        Generate Procurement Request
      </h2>

      <button
        (click)="close.emit()"
        class="text-2xl text-gray-500 hover:text-red-700">
        ✕
      </button>

    </div>

  </div>

  <!-- Form -->

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="p-6">

    <div class="grid md:grid-cols-3 gap-5">

      <div>

        <label class="block text-sm font-semibold mb-2">
          Order Number
        </label>

        <input
          formControlName="orderNumber"
          class="w-full border rounded-lg px-4 py-3">

      </div>

      <div>

        <label class="block text-sm font-semibold mb-2">
          Vendor Company
        </label>

        <input
          formControlName="vendorCompany"
          class="w-full border rounded-lg px-4 py-3">

      </div>

      <div>

        <label class="block text-sm font-semibold mb-2">
          Procurement Cost (INR)
        </label>

        <input
          type="number"
          formControlName="procurementCost"
          class="w-full border rounded-lg px-4 py-3">

      </div>

    </div>

    <div class="flex justify-end gap-3 mt-8">

      <button
        type="button"
        (click)="close.emit()"
        class="px-5 py-2 border rounded-lg">

        Cancel

      </button>

      <button
        type="submit"
        class="px-6 py-2 bg-red-800 hover:bg-red-900 text-white rounded-lg">

        Raise PO Request

      </button>

    </div>

  </form>

</div>
