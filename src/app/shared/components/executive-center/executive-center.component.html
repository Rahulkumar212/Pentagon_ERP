<div class="space-y-8">

  <!-- Header -->

  <div class="border-b border-gray-200 pb-6">

    <p
      class="uppercase tracking-[0.2em] text-red-800 text-sm font-bold"
    >
      Pentagon Business Console
    </p>

    <h1
      class="text-5xl font-black text-gray-900 mt-2"
    >
      Welcome, Sales Executive
    </h1>

    <p
      class="text-gray-500 mt-3"
    >
      Code:
      <span class="font-semibold">
        SME001
      </span>

      |

      Department:
      <span class="font-semibold">
        Sales and Marketing
      </span>

      |

      Location:
      <span class="font-semibold">
        South India
      </span>
    </p>

  </div>

  <!-- KPI Cards -->

  <div
    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6"
  >

    @for(card of cards; track card.title){

    <div
      class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-all"
    >

      <p
        class="text-xs tracking-[0.15em] font-bold text-gray-500 uppercase"
      >
        {{ card.title }}
      </p>

      <h2
        class="text-4xl font-black text-gray-900 mt-5"
      >
        {{ card.value }}
      </h2>

      <p
        class="mt-4 text-sm font-medium"
        [class]="card.color"
      >
        {{ card.description }}
      </p>

    </div>

    }

  </div>

</div>
