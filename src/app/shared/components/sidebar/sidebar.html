<aside
  class="fixed lg:static top-0 left-0 z-50 w-72 h-screen bg-[#111111] border-r border-white/10 flex flex-col text-white transform transition-transform duration-300 ease-in-out lg:translate-x-0"
  [class.-translate-x-full]="!isOpen" [class.translate-x-0]="isOpen">

  <!-- Logo -->

  <div class="h-20 px-6 border-b border-white/10 flex items-center justify-between">

    <div class="flex items-center">

      <div class="w-8 h-8 bg-red-700 rotate-45 mr-4 shadow-lg shadow-red-900/50">

      </div>

      <div>

        <h2 class="text-xl font-extrabold tracking-tight text-white">

          PENTAGON

        </h2>

        <p class="text-xs uppercase tracking-widest text-red-600 font-bold">

          CRM

        </p>

      </div>

    </div>

    <button class="lg:hidden text-2xl text-white" (click)="closeSidebar.emit()">

      ✕

    </button>

  </div>

  <!-- Navigation -->

  <div class="flex-1 overflow-y-auto p-4 hide-scrollbar">

    <p class="text-xs uppercase tracking-widest text-white/40 font-bold mb-3">

      {{ getConsoleTitle(currentRole) }}

    </p>



    @for(section of getSections(currentRole); track section.heading)
    {


    <div class="mt-6 mb-2 text-xs uppercase tracking-widest text-white/40 font-bold">

      {{section.heading}}

    </div>



    @for(item of section.items; track item.route)
    {


    <a [routerLink]="item.route" (click)="closeSidebar.emit()"
      routerLinkActive="bg-red-900/20 text-white border-l-4 border-red-700"
      class="flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5">


      <span>

        {{item.icon}}

      </span>


      {{item.label}}


    </a>


    }


    }
  </div>

</aside>

@if (isOpen) {

<div class="fixed inset-0 z-40 bg-black/50 lg:hidden" (click)="closeSidebar.emit()">

</div>

}
