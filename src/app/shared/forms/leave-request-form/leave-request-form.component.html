<!-- Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">

  <!-- Modal -->
  <div class="w-full max-w-2xl overflow-hidden rounded-xl border border-gray-200 bg-white shadow-2xl">

    <!-- Header -->
    <div class="flex items-center justify-between border-b border-gray-200 bg-white px-6 py-5">

      <div>

        <p class="text-[10px] uppercase tracking-[0.25em] text-gray-500">

          Employee Leave

        </p>

        <h2 class="mt-1 text-xl font-serif text-red-900">

          Leave Request Form

        </h2>

        <p class="mt-1 text-xs text-gray-500">

          Submit your leave request for approval

        </p>

      </div>

      <button type="button" (click)="onCancel()"
        class="flex h-9 w-9 items-center justify-center rounded-lg border border-gray-200 text-gray-500 transition hover:bg-gray-100 hover:text-red-700">

        ✕

      </button>

    </div>

    <!-- Body -->
    <div class="grid grid-cols-2 gap-5 p-6">

      <!-- Employee -->
      <div>

        <label class="mb-2 block text-xs font-semibold text-gray-700">

          Applicant

        </label>

        <select [(ngModel)]="form.applicant_name"
          class="h-11 w-full rounded-lg border border-gray-300 px-3 text-sm outline-none transition focus:border-red-700">

          @for(employee of employees; track employee){

          <option [value]="employee">

            {{ employee }}

          </option>

          }

        </select>

      </div>

      <!-- Leave Type -->
      <div>

        <label class="mb-2 block text-xs font-semibold text-gray-700">

          Leave Type

        </label>

        <select [(ngModel)]="form.leave_category"
          class="h-11 w-full rounded-lg border border-gray-300 px-3 text-sm outline-none transition focus:border-red-700">

          @for(type of leaveTypes; track type){

          <option [value]="type">

            {{ type }}

          </option>

          }

        </select>

      </div>

      <!-- From Date -->
      <div>

        <label class="mb-2 block text-xs font-semibold text-gray-700">

          From Date

        </label>

        <input type="date" [(ngModel)]="form.from_date"
          class="h-11 w-full rounded-lg border border-gray-300 px-3 text-sm outline-none transition focus:border-red-700">

      </div>

      <!-- To Date -->
      <div>

        <label class="mb-2 block text-xs font-semibold text-gray-700">

          To Date

        </label>

        <input type="date" [(ngModel)]="form.to_date"
          class="h-11 w-full rounded-lg border border-gray-300 px-3 text-sm outline-none transition focus:border-red-700">

      </div>

      <!-- Reason -->
      <div class="col-span-2">

        <label class="mb-2 block text-xs font-semibold text-gray-700">

          Reason for absence

        </label>

        <textarea rows="5" [(ngModel)]="form.reason_absence" placeholder="Enter leave reason..."
          class="w-full resize-none rounded-lg border border-gray-300 p-3 text-sm outline-none transition focus:border-red-700">

        </textarea>

      </div>

    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 border-t border-gray-200 bg-gray-50 px-6 py-4">

      <button type="button" (click)="onCancel()"
        class="rounded-lg border border-gray-300 px-5 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100">

        Cancel

      </button>

      <button type="button" (click)="onSubmit()" [disabled]="isLoading"
        class="rounded-lg bg-red-900 px-6 py-2 text-sm font-semibold text-white transition hover:bg-red-800 disabled:opacity-50">

        {{ isLoading ? 'Submitting...' : 'Submit Request' }}

      </button>

    </div>

  </div>

</div>
